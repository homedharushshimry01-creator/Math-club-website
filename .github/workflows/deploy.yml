name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Fix permissions
        run: chmod +x node_modules/.bin/esbuild

      - name: Build
        run: npm run build

      - name: Fix boot.js for GitHub Pages
        run: |
          printf 'async function loadApp() {\n  if (!document.querySelector("link[data-mathclub-static-style]")) {\n    const link = document.createElement("link");\n    link.rel = "stylesheet";\n    link.href = "./style.css";\n    link.dataset.mathclubStaticStyle = "true";\n    document.head.appendChild(link);\n  }\n  await import("./app.js");\n}\nloadApp();\n' > dist/boot.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4